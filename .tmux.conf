set -g mouse on
set -g set-clipboard on

setw -g mode-keys vi

bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

bind -T copy-mode-vi WheelUpPane send-keys -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -N1 -X scroll-down

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"


# Shift+Enterの改行をClaude Code(tmux内)で有効化するための設定
# tmuxがKittyキーボードプロトコルに非対応のため、CSI uシーケンスに変換して転送する
bind-key -n S-Enter send-keys Escape "[13;2u"
set -s extended-keys on
set -as terminal-features 'xterm-256color:extkeys'
