# ===========================
# マウス・クリップボード
# ===========================

# マウス操作を有効化（ペインのクリック切り替え・境界線ドラッグリサイズ・スクロール）
set -g mouse on

# tmuxの内部クリップボードとOSのクリップボードを連携
set -g set-clipboard on

# ===========================
# viモード
# ===========================

# コピーモード（Ctrl+b → [）でviキーバインドを使う
setw -g mode-keys vi

# ===========================
# コピー設定（macOS向け）
# ===========================

# コピーモードでEnterを押したときにmacOSのクリップボード（pbcopy）に送る
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# コピーモード中のマウスホイールを1行単位にする（デフォルトは数行単位で飛びすぎる）
bind -T copy-mode-vi WheelUpPane send-keys -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -N1 -X scroll-down

# ===========================
# ターミナルカラー
# ===========================

# tmux内で256色を使えるようにする
set -g default-terminal "screen-256color"

# ===========================
# Shift+Enter（Claude Code tmux内での改行）
# ===========================

# tmuxがKittyキーボードプロトコルに非対応のため、CSI uシーケンスに変換して転送する
bind-key -n S-Enter send-keys Escape "[13;2u"
set -s extended-keys on
set -as terminal-features 'xterm-256color:extkeys'
